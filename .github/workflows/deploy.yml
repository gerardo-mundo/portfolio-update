name: Deploy Angular App to GitHub Pages

# Run this workflow every time you push to the main branch
on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

# Grant GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple deployments from running at the same time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Node 22 pairs well with Angular 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Project
        run: npm run build -- --base-href /portfolio-update/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/portfolio/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4